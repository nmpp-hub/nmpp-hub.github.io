site_name: NMPP Division at IPP
site_description: Documentation hub for NMPP division codes at IPP.
site_url: https://nmpp-hub.github.io
repo_name: nmpp-hub.github.io
repo_url: https://github.com/nmpp-hub/nmpp-hub.github.io

theme:
  name: material
  language: en
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - hooks/nav_codes.py

nav:
  - Home: index.md
  - Codes: []
  - Publications: publications.md
  - Dissertations: dissertations.md

extra_javascript:
  - assets/javascripts/publications-search.js

extra_css:
  - assets/stylesheets/theme.css
  - assets/stylesheets/publications.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nmpp-hub/nmpp-hub.github.io
