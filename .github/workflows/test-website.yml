name: Build website

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install -r requirements.txt

      - run: npm ci

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.27

      - run: npm run build:presentations

      - run: python generate_website.py --refresh

      - run: git status

      - run: git diff

      - run: npm run build
